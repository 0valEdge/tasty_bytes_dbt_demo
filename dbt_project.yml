name: 'tasty_bytes'
version: "2.0"
config-version: 2
profile: tasty_bytes

## Sources
model-paths: [models]
analysis-paths: [analysis]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]


## Target
target-path: target
clean-targets: [target, dbt_modules]

## Models
models:
  tasty_bytes:
    staging:
      +materialized: table
    marts:
      +materialized: view
tests:
  +store_failures: true
  +severity: warn
on-run-start:
  - "{{ create_dq_tables()}}"
on-run-end:
  - "{{ dqstats_log_results(results)}}"
  - "{{dq_failure_records(results)}}"