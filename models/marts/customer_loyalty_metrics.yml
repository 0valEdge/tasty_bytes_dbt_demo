version: 2

models:
  - name: customer_loyalty_metrics
    description: "Aggregated customer sales with total revenue and visited locations"

    config:
      schema: DEV_EDW
      materialized: incremental
      unique_key: customer_id

      contract:
        enforced: true

      tags: [gold, customer, sales]

      meta:
        owner: data_engineering_team
        domain: customer_analytics
        sensitivity: medium
        pii_columns: ['e_mail', 'phone_number']

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [customer_id]

      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_sales >= 0"

      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('raw_customer_customer_loyalty')

      - dbt_utils.fewer_rows_than:
          arguments:
            compare_model: ref('raw_customer_customer_loyalty')

    columns:

      - name: customer_id
        description: "Unique identifier for customer"
        data_type: integer
        tests:
          - not_null
          - unique
        constraints:
          - type: primary_key

      - name: first_name
        description: "Customer first name"
        data_type: varchar
        tests:
          - not_null

      - name: last_name
        description: "Customer last name"
        data_type: varchar
        tests:
          - not_null

      - name: e_mail
        description: "Customer email address"
        data_type: varchar
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'

      - name: country
        description: "Customer country"
        data_type: varchar
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['USA', 'India', 'UK', 'Canada']

      - name: city
        description: "Customer city"
        data_type: varchar
        tests:
          - not_null

      - name: phone_number
        description: "Customer phone number"
        data_type: varchar
        tests:
          - not_null
          - valid_phone

      - name: total_sales
        description: "Total sales amount per customer"
        data_type: number
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "total_sales >= 0"
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                strictly: false

      - name: visited_location_ids_array
        description: "Array of distinct visited location IDs"
        data_type: variant
        tests:
          - not_null

      - name: created_at
        description: "Record creation timestamp"
        data_type: timestamp
        tests:
          - not_null

      - name: updated_at
        description: "Last update timestamp"
        data_type: timestamp
        tests:
          - not_null


semantic_models:
  - name: customer_sales_semantic
    description: "Semantic model for customer-level sales analytics"

    model: ref('customer_loyalty_metrics')

    defaults:
      agg_time_dimension: created_at

    entities:
      - name: customer_id
        type: primary

    dimensions:
      - name: country
        type: categorical
      - name: city
        type: categorical
      - name: first_name
        type: categorical
      - name: last_name
        type: categorical

    measures:
      - name: total_sales
        agg: sum
        expr: total_sales

      - name: customer_count
        agg: count
        expr: customer_id


metrics:
  - name: total_revenue
    model: ref('customer_loyalty_metrics')
    calculation_method: sum
    expression: total_sales
    timestamp: created_at
    time_grains: [day, week, month]

  - name: total_customers
    model: ref('customer_loyalty_metrics')
    calculation_method: count
    expression: customer_id
    timestamp: created_at

  - name: avg_revenue_per_customer
    model: ref('customer_loyalty_metrics')
    calculation_method: derived
    expression: total_revenue / total_customers


unit_tests:
  - name: test_total_sales_non_negative
    model: customer_loyalty_metrics

    given:
      - input: ref('raw_customer_customer_loyalty')
        rows:
          - customer_id: 1
          - customer_id: 2

      - input: ref('raw_pos_order_header')
        rows:
          - customer_id: 1
            total_sales: 100
          - customer_id: 2
            total_sales: -50

    expect:
      rows:
        - customer_id: 1
          total_sales: 100